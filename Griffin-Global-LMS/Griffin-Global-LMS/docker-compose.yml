version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: griffin
      POSTGRES_PASSWORD: changeme
      POSTGRES_DB: griffin_lms
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U griffin -d griffin_lms"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: artifacts/api-server/Dockerfile
    restart: unless-stopped
    environment:
      PORT: 5000
      NODE_ENV: production
      DATABASE_URL: postgresql://griffin:changeme@db:5432/griffin_lms
      ALLOWED_ORIGINS: http://localhost:3000
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: artifacts/griffin-lms/Dockerfile
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - api

volumes:
  pgdata:
